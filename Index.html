<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#242c2d">
<title>Kitob Hamroh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{--display:'Fraunces',Georgia,serif;--body:'Manrope',system-ui,sans-serif;--mono:'Space Mono',monospace;
 --bg:#EDE4D2;--txt:#2A2620;--dim:#8A7B66;--line:rgba(42,38,32,.13);--accent:#A06A4A;
 --outer:#d9cbb3;--ring1:#e6e1d8;--ring2:#cfc9bc;--btnbg:#2A2620;--btnfg:#fff;
 --glass-bg:linear-gradient(135deg,rgba(255,255,255,.6),rgba(255,255,255,.32));--glass-bord:rgba(255,255,255,.7);--glass-hl:rgba(255,255,255,.6);
 --surf:rgba(255,255,255,.45);--track:rgba(42,38,32,.14);--dash:rgba(42,38,32,.26);--blob1:#e6d6c2;--blob2:#ddcdb0}
.t-soot{--bg:#242c2d;--txt:#E9E9E6;--dim:#94A09D;--line:rgba(255,255,255,.13);--accent:#CBB48F;
 --outer:#161b1c;--ring1:#202829;--ring2:#0e1313;--btnbg:#E9E9E6;--btnfg:#1b2122;
 --glass-bg:linear-gradient(135deg,rgba(255,255,255,.10),rgba(255,255,255,.035));--glass-bord:rgba(255,255,255,.16);--glass-hl:rgba(255,255,255,.12);
 --surf:rgba(255,255,255,.08);--track:rgba(255,255,255,.16);--dash:rgba(255,255,255,.22);--blob1:#33403f;--blob2:#2b3a39}
.t-moss{--bg:#E7EAE1;--txt:#2B322B;--dim:#76836F;--line:rgba(43,50,43,.13);--accent:#5E7464;
 --outer:#cdd6c5;--ring1:#dde3d6;--ring2:#c2cbb8;--btnbg:#2B322B;--btnfg:#fff;
 --glass-bg:linear-gradient(135deg,rgba(255,255,255,.55),rgba(255,255,255,.3));--glass-bord:rgba(255,255,255,.68);--glass-hl:rgba(255,255,255,.55);
 --surf:rgba(255,255,255,.42);--track:rgba(43,50,43,.14);--dash:rgba(43,50,43,.26);--blob1:#cdd6c4;--blob2:#bcc9b2}
html,body{height:100%}
body{font-family:var(--body);background:var(--outer);display:flex;align-items:center;justify-content:center;padding:18px 10px;overflow:hidden;transition:background .35s ease}
.phone{position:relative;width:100%;max-width:380px;height:780px;max-height:94vh;border-radius:42px;overflow:hidden;isolation:isolate;background:var(--bg);box-shadow:0 40px 90px -30px rgba(0,0,0,.45),0 0 0 9px var(--ring1),0 0 0 10px var(--ring2);display:flex;flex-direction:column;transition:background .35s ease}
@media(max-width:440px){body{padding:0}.phone{max-width:100%;height:100vh;max-height:100vh;border-radius:0;box-shadow:none}}
.bg{position:absolute;inset:0;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(60px);opacity:.55;transition:background .35s ease}
.blob.a{width:320px;height:320px;left:-90px;top:-60px;background:var(--blob1)}
.blob.b{width:300px;height:300px;right:-100px;bottom:60px;background:var(--blob2)}
.glass{background:var(--glass-bg);-webkit-backdrop-filter:blur(20px) saturate(115%);backdrop-filter:blur(20px) saturate(115%);border:1px solid var(--glass-bord);box-shadow:0 10px 34px -16px rgba(0,0,0,.30),inset 0 1px 0 var(--glass-hl);position:relative}
.head{position:relative;z-index:5;display:flex;align-items:center;justify-content:space-between;margin:14px 12px 0;padding:9px 12px;border-radius:18px}
.brand{display:flex;align-items:center;gap:8px;color:var(--txt);min-width:0}
.brand .mk{width:25px;height:25px;flex:0 0 auto;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:600;font-size:14px;color:var(--btnfg);background:var(--btnbg)}
.brand .nm{font-family:var(--display);font-weight:500;font-size:15px;white-space:nowrap}
.right{display:flex;align-items:center;gap:8px}
.themes{display:flex;gap:5px}
.swatch{width:18px;height:18px;border-radius:50%;border:0;cursor:pointer;box-shadow:inset 0 0 0 1px rgba(0,0,0,.12)}
.swatch.on{outline:2px solid var(--txt);outline-offset:1px}
.lang{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;font-family:var(--mono);font-size:10px}
.lang button{border:0;background:transparent;padding:5px 7px;cursor:pointer;color:var(--dim)}
.lang button.on{background:var(--btnbg);color:var(--btnfg)}
.main{position:relative;z-index:2;flex:1 1 auto;overflow:hidden}
.view{position:absolute;inset:0;display:none;flex-direction:column}
.view.on{display:flex}
.scroll{flex:1 1 auto;overflow-y:auto;padding:16px 18px 18px}
.scroll::-webkit-scrollbar{display:none}
.vtitle{font-family:var(--display);font-weight:500;font-size:23px;color:var(--txt);margin-bottom:3px}
.vsub{font-size:11.5px;color:var(--dim);margin-bottom:14px}
.scanwrap{padding:18px;display:flex;flex-direction:column;height:100%}
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim)}
.scan-title{font-family:var(--display);font-weight:500;font-size:27px;line-height:1.05;color:var(--txt);margin:8px 0 0}
.scan-title em{font-style:italic;color:var(--accent)}
.viewport{position:relative;margin-top:16px;flex:1 1 auto;border-radius:18px;overflow:hidden;background:#1c1813;border:1px solid var(--line)}
.viewport video{width:100%;height:100%;object-fit:cover;display:none}
.viewport.live video{display:block}
.reticle{position:absolute;inset:24% 16%;z-index:2}
.corner{position:absolute;width:24px;height:24px;border:2px solid #fff;opacity:.85}
.corner.tl{top:0;left:0;border-right:0;border-bottom:0;border-radius:7px 0 0 0}
.corner.tr{top:0;right:0;border-left:0;border-bottom:0;border-radius:0 7px 0 0}
.corner.bl{bottom:0;left:0;border-right:0;border-top:0;border-radius:0 0 0 7px}
.corner.br{bottom:0;right:0;border-left:0;border-top:0;border-radius:0 0 7px 0}
.scanline{position:absolute;left:10%;right:10%;height:1.5px;background:var(--accent);opacity:.85;box-shadow:0 0 10px 1px var(--accent);animation:sweep 2.6s ease-in-out infinite;z-index:2}
@keyframes sweep{0%,100%{top:8%}50%{top:92%}}
.detect{position:absolute;inset:0;z-index:9;display:none;flex-direction:column;align-items:center;justify-content:center;gap:13px;background:rgba(20,16,12,.6);-webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);color:#fff}
.detect.on{display:flex}
.ring{width:50px;height:50px;border-radius:50%;border:2.5px solid #fff;border-top-color:transparent;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.detect .t{font-family:var(--mono);letter-spacing:.16em;font-size:10.5px}
.scaninfo{display:flex;justify-content:space-between;align-items:center;margin-top:11px}
.scaninfo .hint{color:var(--dim);font-family:var(--mono);font-size:9.5px;letter-spacing:.06em}
.scaninfo .cnt{font-family:var(--mono);font-size:9.5px;color:var(--accent)}
.btn{margin-top:12px;border:0;cursor:pointer;border-radius:14px;padding:14px;font-family:var(--body);font-weight:600;font-size:14px;color:var(--btnfg);background:var(--btnbg)}
.btn:active{transform:scale(.98)}.btn:disabled{opacity:.5}
.demo-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin:14px 0 9px}
.demo-row{display:flex;gap:8px}
.demo-card{flex:1;cursor:pointer;border:0;background:transparent;padding:0;text-align:left;display:flex;flex-direction:column;gap:5px}
.demo-card img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:4px;box-shadow:0 6px 14px -7px rgba(0,0,0,.5)}
.demo-card .dn{font-size:9px;color:var(--txt);font-weight:600;line-height:1.15}
.demo-card.unknown .ph{width:100%;aspect-ratio:2/3;border-radius:4px;border:1px dashed var(--dash);display:flex;align-items:center;justify-content:center;font-family:var(--mono);color:var(--dim)}
.search-bar{display:flex;align-items:center;gap:9px;background:var(--surf);border:1px solid var(--line);border-radius:13px;padding:11px 13px;margin-bottom:16px}
.search-bar input{flex:1;border:0;background:transparent;font-family:var(--body);font-size:14px;color:var(--txt);outline:none}
.search-bar input::placeholder{color:var(--dim)}
.search-bar svg{color:var(--dim);flex:0 0 auto}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.tile{cursor:pointer;border:0;background:transparent;padding:0;text-align:left;display:flex;flex-direction:column;gap:6px;position:relative}
.tile-cover{aspect-ratio:2/3;border-radius:4px;overflow:hidden;position:relative;box-shadow:0 8px 18px -10px rgba(0,0,0,.4);background:#cfc7ba}
.tile-cover img{width:100%;height:100%;object-fit:cover;display:block}
.tile-rank{position:absolute;top:5px;left:5px;z-index:2;font-family:var(--mono);font-size:9px;background:rgba(20,16,12,.8);color:#fff;border-radius:5px;padding:2px 5px}
.tile-aud{position:absolute;bottom:5px;right:5px;z-index:2;width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center}
.tile-empty{width:100%;height:100%;display:flex;align-items:center;justify-content:center;border:1px dashed var(--dash);border-radius:4px}
.tile-empty span{font-family:var(--mono);font-size:9px;color:var(--dim);text-align:center;padding:0 6px;line-height:1.3}
.tile .tnm{font-size:10px;color:var(--txt);font-weight:600;line-height:1.18}
.tile.locked{cursor:default;opacity:.8}
.empty-state{text-align:center;color:var(--dim);padding:50px 20px;font-size:13px;line-height:1.6}
.empty-state .big{font-size:34px;margin-bottom:10px;opacity:.5}
.track{position:absolute;top:0;bottom:0;left:0;display:flex;will-change:transform;touch-action:pan-y}
.slot{height:100%;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.card{width:100%;height:94%;border-radius:24px;padding:18px;overflow-y:auto;display:flex;flex-direction:column;position:relative}
.card::-webkit-scrollbar{display:none}
.dtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.back{width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:var(--surf);color:var(--txt);cursor:pointer;display:flex;align-items:center;justify-content:center}
.heart{width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:var(--surf);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--dim)}
.heart.on{color:#c0392b;border-color:#c0392b}
.bk-top{display:flex;gap:14px}
.cover{width:100px;height:auto;max-height:150px;flex:0 0 auto;border-radius:3px 6px 6px 3px;object-fit:cover;box-shadow:0 14px 28px -12px rgba(0,0,0,.45);background:#ddd}
.bk-meta{flex:1;min-width:0}
.tag{display:inline-block;font-family:var(--mono);font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent);border-radius:20px;padding:3px 8px}
.bk-meta h2{font-family:var(--display);font-weight:500;color:var(--txt);font-size:18px;line-height:1.1;margin:9px 0 0}
.bk-meta .auth{color:var(--dim);font-size:12px;margin-top:4px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
.chip{font-family:var(--mono);font-size:9px;color:var(--txt);background:var(--surf);border-radius:6px;padding:4px 7px;display:flex;align-items:center;gap:4px}
.chip .star{color:#d99a3a}
.annot{margin-top:14px;color:var(--txt);font-size:12.5px;line-height:1.55;opacity:.92}
.audio{margin-top:14px;border-radius:14px;padding:12px}
.audio-main{display:flex;align-items:center;gap:11px}
.audio-btn{width:42px;height:42px;flex:0 0 auto;border-radius:50%;border:0;cursor:pointer;background:var(--btnbg);color:var(--btnfg);display:flex;align-items:center;justify-content:center}
.audio-btn:active{transform:scale(.92)}
.audio .am{flex:1;min-width:0;color:var(--txt)}
.audio .am .l1{font-weight:600;font-size:12px;display:flex;align-items:center;gap:6px}
.audio .am .l1 .badge{font-family:var(--mono);font-size:7px;letter-spacing:.05em;text-transform:uppercase;background:var(--accent);color:#fff;border-radius:5px;padding:2px 5px}
.audio .am .l2{font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:3px}
.spd{font-family:var(--mono);font-size:10px;border:1px solid var(--line);background:var(--surf);border-radius:8px;padding:6px 7px;cursor:pointer;color:var(--txt);flex:0 0 auto}
.seek{height:5px;border-radius:5px;background:var(--track);margin-top:11px;cursor:pointer;position:relative;display:none}
.seek.on{display:block}
.seek > i{display:block;height:100%;background:var(--accent);width:0%;border-radius:5px}
.sect-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin:18px 0 9px}
.rec{display:flex;gap:9px;overflow-x:auto;padding-bottom:4px}
.rec::-webkit-scrollbar{display:none}
.rec-card{flex:0 0 auto;width:64px;cursor:pointer;border:0;background:transparent;padding:0;text-align:left}
.rec-card img{width:64px;height:96px;object-fit:cover;border-radius:4px;box-shadow:0 6px 14px -7px rgba(0,0,0,.4)}
.rec-card .rn{font-size:8.5px;color:var(--txt);font-weight:600;line-height:1.15;margin-top:5px}
.actions{display:flex;gap:9px;margin-top:16px}
.actions a{flex:1;text-decoration:none;text-align:center;border-radius:12px;padding:12px;font-weight:600;font-size:12.5px;display:flex;align-items:center;justify-content:center;gap:6px}
.act-order{background:var(--btnbg);color:var(--btnfg)}
.act-share{background:transparent;color:var(--txt);border:1px solid var(--txt)}
.dots{position:absolute;left:0;right:0;bottom:8px;z-index:4;display:flex;gap:6px;align-items:center;justify-content:center}
.dot{width:6px;height:6px;border-radius:50%;background:var(--track);border:0}
.dot.on{width:18px;border-radius:4px;background:var(--accent)}
.err{margin-top:8px;font-family:var(--mono);font-size:9px;color:#c0392b}
.bnav{position:relative;z-index:5;display:flex;justify-content:space-around;align-items:center;margin:0 12px 12px;padding:8px 6px;border-radius:20px}
.bnav button{border:0;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--dim);font-family:var(--body);font-size:9px;font-weight:600;padding:4px 10px;border-radius:12px}
.bnav button.on{color:var(--txt)}
.bnav button.on svg{color:var(--accent)}
@media(prefers-reduced-motion:reduce){.scanline,.ring{animation:none!important}}
</style>
</head><body>

 <div class="bg"><div class="blob a"></div><div class="blob b"></div></div>

   <div class="themes" id="themes">

    <button class="swatch" data-theme="moss" style="background:#697C70" title="Moss"></button>
   </div>

 </div>
 <div class="main" id="main">
  <div class="view on" id="v-scan"></div>
  <div class="view" id="v-search"></div>
  <div class="view" id="v-cat"></div>
  <div class="view" id="v-fav"></div>
  <div class="view" id="v-detail"></div>
 </div>
 <div class="bnav glass" id="bnav"></div>
</div>

const els={scan:document.getElementById('v-scan'),search:document.getElementById('v-search'),cat:document.getElementById('v-cat'),fav:document.getElementById('v-fav'),detail:document.getElementById('v-detail'),main:document.getElementById('main'),bnav:document.getElementById('bnav')};

const NAV=[
 {id:'scan',k:'nav_scan',svg:'<path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M7 12h10" stroke-linecap="round"/>'},
 {id:'search',k:'nav_search',svg:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4" stroke-linecap="round"/>'},
 {id:'cat',k:'nav_cat',svg:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>'},
 {id:'fav',k:'nav_fav',svg:'<path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/>'}
];
function buildNav(){els.bnav.innerHTML='';NAV.forEach(n=>{const b=document.createElement('button');b.dataset.nav=n.id;b.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'+n.svg+'</svg><span>'+t(n.k)+'</span>';b.addEventListener('click',()=>setView(n.id));els.bnav.appendChild(b);});syncNav();}
function syncNav(){[...els.bnav.children].forEach(b=>{const id=b.dataset.nav;const a=(id===view)||(view==='detail'&&id===deckFrom);b.classList.toggle('on',a);});}

function setView(v){stopAll();view=v;['scan','search','cat','fav','detail'].forEach(k=>els[k].classList.toggle('on',k===v));if(v==='scan')renderScan();if(v==='search')renderSearch();if(v==='cat')renderCat();if(v==='fav')renderFav();syncNav();}

let stream=null,detLoop=null;
function renderScan(){
 els.scan.innerHTML='<div class="scanwrap">'+
  '<span class="eyebrow" data-i18n="scan_eyebrow"></span>'+
  '<h1 class="scan-title" data-i18n-html="scan_title"></h1>'+
  '<div class="viewport" id="vp"><video id="vid" playsinline muted></video>'+
   '<div class="reticle"><span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span></div>'+
   '<div class="scanline"></div><div class="detect" id="det"><div class="ring"></div><div class="t">ANIQLANMOQDA</div></div></div>'+
  '<div class="scaninfo"><span class="hint" data-i18n="scan_hint"></span><span class="cnt"><span data-i18n="scan_today"></span>'+scanCount+'</span></div>'+
  '<button class="btn" id="camBtn"></button>'+
  '<div class="demo-lbl" data-i18n="scan_demo"></div><div class="demo-row" id="demoRow"></div></div>';
 const row=els.scan.querySelector('#demoRow');
 BOOKS.slice(0,4).forEach(b=>{const c=document.createElement('button');c.className='demo-card';c.innerHTML='<img src="'+b.cover+'" alt=""><span class="dn">'+esc(b.author)+'</span>';c.addEventListener('click',()=>fakeDetect(b.id));row.appendChild(c);});
 const u=document.createElement('button');u.className='demo-card unknown';u.innerHTML='<div class="ph">?</div><span class="dn" data-i18n="unknown"></span>';u.addEventListener('click',()=>notFound());row.appendChild(u);
 const camBtn=els.scan.querySelector('#camBtn');camBtn.textContent=t('scan_cam');camBtn.addEventListener('click',()=>{stream?stopCam():startCam();});
 applyLang(els.scan);
}
function fakeDetect(id){const det=els.scan.querySelector('#det');if(det)det.classList.add('on');setTimeout(()=>{if(det)det.classList.remove('on');bumpScan();openDeck('cat',BOOKS.findIndex(b=>b.id===id));},1100);}
async function startCam(){
 const vp=els.scan.querySelector('#vp'),vid=els.scan.querySelector('#vid'),btn=els.scan.querySelector('#camBtn');
 try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});vid.srcObject=stream;await vid.play();vp.classList.add('live');btn.textContent=t('scan_stop');
  if('BarcodeDetector' in window){const bd=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','code_128']});detLoop=setInterval(async()=>{try{const codes=await bd.detect(vid);if(codes&&codes.length){onBarcode(codes[0].rawValue.replace(/\D/g,''));}}catch(e){}},700);}
  else{showErr('Bu brauzerda avtomatik aniqlash yo\'q');}
 }catch(e){showErr('Kamera ochilmadi (HTTPS kerak). Demo\'dan tanlang.');}
}
function stopCam(){if(detLoop){clearInterval(detLoop);detLoop=null;}if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}const vp=els.scan.querySelector('#vp'),btn=els.scan.querySelector('#camBtn');if(vp)vp.classList.remove('live');if(btn)btn.textContent=t('scan_cam');}
function onBarcode(raw){const b=BOOKS.find(x=>x.barcode&&x.barcode===raw);stopCam();bumpScan();if(b)openDeck('cat',BOOKS.indexOf(b));else notFound();}
function showErr(m){let e=els.scan.querySelector('.err');if(!e){e=document.createElement('div');e.className='err';els.scan.querySelector('.scanwrap').insertBefore(e,els.scan.querySelector('#camBtn'));}e.textContent=m;}
function bumpScan(){scanCount++;lsSet('kh_scans',scanCount);}
function notFound(){
 els.detail.innerHTML='<div style="display:flex;flex-direction:column;height:100%;padding:24px;align-items:center;justify-content:center;text-align:center"><div style="font-size:40px;color:var(--dim)">?</div><div style="font-family:var(--display);font-size:22px;color:var(--txt);margin-top:12px">'+t('notfound')+'</div><p style="color:var(--dim);font-size:13px;margin-top:8px;max-width:24ch">'+t('nf_sub')+'</p><button class="btn" style="margin-top:20px;width:80%" id="nfBack">'+t('retry')+'</button></div>';
 els.detail.querySelector('#nfBack').addEventListener('click',()=>setView('scan'));
 stopAll();view='detail';deckFrom='scan';['scan','search','cat','fav','detail'].forEach(k=>els[k].classList.toggle('on',k==='detail'));syncNav();
}

function renderSearch(){
 els.search.innerHTML='<div class="scroll"><div class="search-bar"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4" stroke-linecap="round"/></svg><input id="sIn" type="text" placeholder="'+t('search_ph')+'"></div><div class="grid" id="sGrid"></div></div>';
 const inp=els.search.querySelector('#sIn'),g=els.search.querySelector('#sGrid');
 function run(){const q=inp.value.trim().toLowerCase();const res=q?BOOKS.filter(b=>(b.title+' '+b.author).toLowerCase().indexOf(q)>=0):BOOKS;if(!res.length){g.innerHTML='<div class="empty-state" style="grid-column:1/-1">'+t('search_empty')+'</div>';return;}g.innerHTML='';res.forEach(b=>g.appendChild(tile(b,null,()=>openDeck('search',BOOKS.indexOf(b),res.map(x=>x.id)))));}
 inp.addEventListener('input',run);run();
}
function renderCat(){
 els.cat.innerHTML='<div class="scroll"><div class="vtitle">'+t('cat_title')+'</div><div class="vsub">'+t('cat_sub')+' · '+BOOKS.length+'/'+TOTAL+'</div><div class="grid" id="cGrid"></div></div>';
 const g=els.cat.querySelector('#cGrid');
 BOOKS.forEach((b,i)=>g.appendChild(tile(b,i+1,()=>openDeck('cat',i))));
 for(let i=BOOKS.length;i<TOTAL;i++){const d=document.createElement('div');d.className='tile locked';d.innerHTML='<div class="tile-cover"><span class="tile-rank">'+(i+1)+'</span><div class="tile-empty"><span>'+t('collecting')+'</span></div></div><div class="tnm" style="color:var(--dim);font-weight:500">—</div>';g.appendChild(d);}
}
function renderFav(){
 const list=BOOKS.filter(b=>isFav(b.id));
 if(!list.length){els.fav.innerHTML='<div class="scroll"><div class="vtitle">'+t('fav_title')+'</div><div class="empty-state"><div class="big">♡</div>'+t('fav_empty').replace(/\n/g,'<br>')+'</div></div>';return;}
 els.fav.innerHTML='<div class="scroll"><div class="vtitle">'+t('fav_title')+'</div><div class="vsub">'+list.length+t('books_suffix')+'</div><div class="grid" id="fGrid"></div></div>';
 const g=els.fav.querySelector('#fGrid');list.forEach(b=>g.appendChild(tile(b,null,()=>openDeck('fav',BOOKS.indexOf(b),list.map(x=>x.id)))));
}
function tile(b,rank,onclick){const e=document.createElement('button');e.className='tile';e.innerHTML='<div class="tile-cover">'+(rank?'<span class="tile-rank">'+rank+'</span>':'')+(audioUrls[b.id]?'<span class="tile-aud">'+AUD_ICON+'</span>':'')+'<img src="'+b.cover+'" alt=""></div><div class="tnm">'+esc(b.title)+'</div>';e.addEventListener('click',onclick);return e;}

function openDeck(from,bookIdx,listIds){deckFrom=from;deck=listIds?listIds.slice():BOOKS.map(b=>b.id);const id=BOOKS[bookIdx].id;deckIndex=Math.max(0,deck.indexOf(id));buildDeck();stopAll();view='detail';['scan','search','cat','fav','detail'].forEach(k=>els[k].classList.toggle('on',k==='detail'));syncNav();}
function measure(){W=els.main.clientWidth||360;cardW=Math.round(W*0.88);step=cardW+gap;pad=Math.round((W-cardW)/2);}
function buildDeck(){
 measure();stoppers.length=0;
 els.detail.innerHTML='<div class="track" id="track"></div><div class="dots" id="ddots"></div>';
 const track=els.detail.querySelector('#track'),dd=els.detail.querySelector('#ddots');
 deck.forEach(id=>{const slot=document.createElement('div');slot.className='slot';slot.style.width=cardW+'px';slot.style.marginRight=gap+'px';const card=document.createElement('div');card.className='card glass';card.innerHTML=detailHTML(bookById(id));wireDetail(card,bookById(id));slot.appendChild(card);track.appendChild(slot);});
 deck.forEach((id,i)=>{const b=document.createElement('button');b.className='dot'+(i===deckIndex?' on':'');b.addEventListener('click',()=>setDeck(i));dd.appendChild(b);});
 wireDrag(track);updateDeck();applyLang(els.detail);
}
function detailHTML(b){
 const real=!!audioUrls[b.id];const fav=isFav(b.id);const recs=BOOKS.filter(x=>x.id!==b.id).slice(0,4);
 return '<div class="dtop"><button class="back" data-role="back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg></button><button class="heart'+(fav?' on':'')+'" data-role="fav">'+(fav?HEARTF:HEART)+'</button></div>'+
 '<div class="bk-top"><img class="cover" src="'+b.cover+'" alt=""><div class="bk-meta"><span class="tag">'+esc(b.genre)+'</span><h2>'+esc(b.title)+'</h2><div class="auth">'+esc(b.author)+'</div>'+
  '<div class="chips"><span class="chip"><span class="star">★</span>'+b.rating.toFixed(1)+'</span><span class="chip">'+b.pages+'<span data-i18n="pages"></span></span><span class="chip">~'+b.minutes+'<span data-i18n="min"></span></span></div></div></div>'+
 '<div class="annot">'+esc(b.annot)+'</div>'+
 '<div class="audio glass"><div class="audio-main"><button class="audio-btn" data-role="play">'+PLAY+'</button>'+
  '<div class="am"><div class="l1"><span data-role="l1" data-i18n="audio_label"></span>'+(real?'<span class="badge">Audio</span>':'')+'</div><div class="l2" data-role="l2" data-i18n="'+(real?'audio_real':'audio_tts')+'"></div></div>'+
  '<button class="spd" data-role="spd">1x</button></div><div class="seek" data-role="seek"><i></i></div>'+(real?'<audio data-role="audio" src="'+audioUrls[b.id]+'" preload="auto"></audio>':'')+'</div>'+
 '<div class="sect-lbl" data-i18n="rec"></div><div class="rec">'+recs.map(r=>'<button class="rec-card" data-rec="'+r.id+'"><img src="'+r.cover+'" alt=""><div class="rn">'+esc(r.title)+'</div></button>').join('')+'</div>'+
 '<div class="actions"><a class="act-order" href="tel:+998998454400"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8a15 15 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.25 11 11 0 0 0 3.5.55 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11 11 0 0 0 .55 3.5 1 1 0 0 1-.25 1z"/></svg><span data-i18n="order"></span></a>'+
  '<a class="act-share" target="_blank" href="https://t.me/share/url?url='+encodeURIComponent('https://qamar.uz')+'&text='+encodeURIComponent(b.title+' — '+b.author)+'"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg><span data-i18n="share"></span></a></div>';
}
function wireDetail(card,b){
 card.querySelector('[data-role=back]').addEventListener('click',()=>setView(deckFrom));
 const heart=card.querySelector('[data-role=fav]');
 heart.addEventListener('click',()=>{toggleFav(b.id);const on=isFav(b.id);heart.classList.toggle('on',on);heart.innerHTML=on?HEARTF:HEART;});
 card.querySelectorAll('[data-rec]').forEach(r=>r.addEventListener('click',()=>{const idx=deck.indexOf(r.dataset.rec);if(idx>=0)setDeck(idx);else openDeck(deckFrom,BOOKS.findIndex(x=>x.id===r.dataset.rec));}));
 const playBtn=card.querySelector('[data-role=play]'),audio=card.querySelector('[data-role=audio]'),l1=card.querySelector('[data-role=l1]'),l2=card.querySelector('[data-role=l2]'),seek=card.querySelector('[data-role=seek]'),seekI=seek.querySelector('i'),spd=card.querySelector('[data-role=spd]');
 const real=!!audio;let ttsOn=false;
 function ui(p){playBtn.innerHTML=p?PAUSE:PLAY;if(real)seek.classList.toggle('on',p);l1.textContent=p?t('audio_play'):t('audio_label');if(!p)l2.textContent=real?t('audio_real'):t('audio_tts');}
 function stop(){try{if(window.speechSynthesis)speechSynthesis.cancel();}catch(e){}ttsOn=false;if(audio){try{audio.pause();audio.currentTime=0;}catch(e){}}ui(false);}
 stoppers.push(stop);
 spd.addEventListener('click',()=>{const arr=[1,1.25,1.5,2];speed=arr[(arr.indexOf(speed)+1)%arr.length];spd.textContent=speed+'x';if(audio)audio.playbackRate=speed;});
 if(real){audio.playbackRate=speed;spd.textContent=speed+'x';
  audio.addEventListener('play',()=>ui(true));audio.addEventListener('playing',()=>ui(true));audio.addEventListener('pause',()=>ui(false));
  audio.addEventListener('ended',()=>{try{audio.currentTime=0;}catch(e){}ui(false);});
  audio.addEventListener('timeupdate',()=>{if(audio.duration){seekI.style.width=(audio.currentTime/audio.duration*100)+'%';if(!audio.paused)l2.textContent=fmt(audio.currentTime)+' / '+fmt(audio.duration);}});
  seek.addEventListener('click',e=>{const r=seek.getBoundingClientRect();const ratio=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));if(audio.duration)audio.currentTime=ratio*audio.duration;});
 }else{spd.style.display='none';}
 playBtn.addEventListener('click',()=>{if(real){if(audio.paused){stopOthers(stop);audio.playbackRate=speed;const p=audio.play();if(p&&p.catch)p.catch(e=>{l2.textContent='Ijro xato: '+((e&&e.name)||'?');});}else{audio.pause();try{audio.currentTime=0;}catch(e){}}}else{if(ttsOn){stop();return;}stopOthers(stop);if(window.speechSynthesis){const u=new SpeechSynthesisUtterance(b.annot);u.lang='uz-UZ';u.rate=0.97*speed;u.onend=()=>{ttsOn=false;ui(false);};u.onerror=()=>{ttsOn=false;ui(false);};speechSynthesis.speak(u);ttsOn=true;ui(true);}}});
}
function stopOthers(self){stoppers.forEach(fn=>{if(fn!==self){try{fn();}catch(e){}}});}
function stopAll(){stoppers.forEach(fn=>{try{fn();}catch(e){}});stopCam();}
function updateDeck(){const track=els.detail.querySelector('#track');if(!track)return;const x=pad-deckIndex*step+dragX;track.style.transition=dragging?'none':'transform .42s cubic-bezier(.22,1,.36,1)';track.style.transform='translateX('+x+'px)';[...track.children].forEach((slot,i)=>{const rel=(i-deckIndex)-dragX/step;const dist=Math.min(Math.abs(rel),1);const c=slot.firstChild;c.style.transform='scale('+(1-dist*0.06)+')';c.style.opacity=(1-dist*0.4);});const dd=els.detail.querySelector('#ddots');if(dd)[...dd.children].forEach((d,i)=>d.classList.toggle('on',i===deckIndex));}
function setDeck(i){deckIndex=Math.max(0,Math.min(i,deck.length-1));stopAll();updateDeck();}
function wireDrag(track){track.addEventListener('pointerdown',e=>{pdown=true;dragging=false;startX=e.clientX;});track.addEventListener('pointermove',e=>{if(!pdown)return;const dx=e.clientX-startX;if(!dragging&&Math.abs(dx)>8){dragging=true;try{track.setPointerCapture(e.pointerId);}catch(_){}}if(dragging){dragX=dx;updateDeck();}});function end(){if(!pdown)return;pdown=false;if(dragging){const th=cardW*0.2;let n=deckIndex;if(dragX<-th)n++;else if(dragX>th)n--;dragX=0;dragging=false;setDeck(n);}}track.addEventListener('pointerup',end);track.addEventListener('pointercancel',end);}

function applyLang(root){root=root||document;root.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.dataset.i18n);});root.querySelectorAll('[data-i18n-html]').forEach(el=>{el.innerHTML=t(el.dataset.i18nHtml);});}
function setLang(l){lang=l;lsSet('kh_lang',l);document.getElementById('langLat').classList.toggle('on',l===0);document.getElementById('langCyr').classList.toggle('on',l===1);document.getElementById('langRus').classList.toggle('on',l===2);buildNav();setView(view==='detail'?deckFrom:view);}
document.getElementById('langLat').addEventListener('click',()=>setLang(0));
document.getElementById('langCyr').addEventListener('click',()=>setLang(1));
document.getElementById('langRus').addEventListener('click',()=>setLang(2));

/* themes */
const THEME_CLASS={beige:'',soot:'t-soot',moss:'t-moss'};
let theme=lsGet('kh_theme','beige'); if(!THEME_CLASS.hasOwnProperty(theme))theme='beige';
function setTheme(id){theme=id;lsSet('kh_theme',id);document.body.className=THEME_CLASS[id]||'';[...document.querySelectorAll('.swatch')].forEach(s=>s.classList.toggle('on',s.dataset.theme===id));}
document.querySelectorAll('.swatch').forEach(s=>s.addEventListener('click',()=>setTheme(s.dataset.theme)));

window.addEventListener('resize',()=>{if(view==='detail'){measure();const track=els.detail.querySelector('#track');if(track)[...track.children].forEach(s=>s.style.width=cardW+'px');updateDeck();}});

/* init */
setTheme(theme);
document.getElementById('langLat').classList.toggle('on',lang===0);
document.getElementById('langCyr').classList.toggle('on',lang===1);
document.getElementById('langRus').classList.toggle('on',lang===2);
buildNav();setView('scan');
</script>
</body></html>
